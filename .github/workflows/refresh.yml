# Auto-updating encrypted portfolio dashboard — rebuilds + deploys on a schedule.
name: refresh-dashboard

# Runs every 5 minutes during NSE market hours (09:15–15:30 IST = 03:45–10:00 UTC),
# Mon–Fri. GitHub schedules are best-effort and may be delayed a few minutes under load.
on:
  schedule:
    - cron: '*/5 3-10 * * 1-5'
  workflow_dispatch: {}        # allows manual "Run workflow" from the Actions tab

concurrency:
  group: refresh-dashboard
  cancel-in-progress: true     # if a run is still going when the next fires, drop the stale one

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 12
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - name: Install deps
        run: pip install -r requirements.txt

      - name: Build encrypted dashboard
        env:
          DASH_PASSWORD: ${{ secrets.DASH_PASSWORD }}
          HOLDINGS_JSON: ${{ secrets.HOLDINGS_JSON }}
        run: python build.py

      - name: Deploy ./public to Vercel (production)
        uses: amondnet/vercel-action@v25
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          vercel-args: '--prod'
          working-directory: ./public
